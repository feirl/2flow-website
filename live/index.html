<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2Flow Live</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0d0d0d;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    .logo {
      margin-bottom: 20px;
    }
    .logo img {
      height: 28px;
      filter: brightness(0) invert(1);
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #e53935;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 18px;
    }
    .live-badge::before {
      content: '';
      width: 7px;
      height: 7px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .stage {
      width: 100%;
      max-width: 1200px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .player-wrap {
      flex: 1 1 0;
      min-width: 0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    }
    .player-inner {
      padding: 56.25% 0 0 0;
      position: relative;
    }
    .player-inner iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }
    .chat-wrap {
      width: 320px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
      background: #1a1a1a;
    }
    .chat-wrap iframe {
      display: block;
      width: 100%;
      height: 520px;
      border: 0;
    }
    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }
    .footer a {
      color: rgba(255,255,255,0.45);
      text-decoration: none;
    }
    @media (max-width: 900px) {
      .stage { flex-direction: column; }
      .chat-wrap { width: 100%; }
      .chat-wrap iframe { height: 400px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <img src="/Images/2flow-logo.png" alt="2Flow" onerror="this.style.display='none'">
    </div>
    <div class="live-badge">Live</div>
    <div class="stage">
      <div class="player-wrap">
        <div class="player-inner">
          <iframe src="https://player.restream.io/?token=2f09d02f632243a789b69d17176f8e16"
            allow="autoplay" allowfullscreen frameborder="0"></iframe>
        </div>
      </div>
      <div class="chat-wrap">
        <iframe src="https://chat.restream.io/embed?token=df99ea46-44c8-49ad-aff9-a3a406c09b7a"
          allowfullscreen></iframe>
      </div>
    </div>
    <p class="footer"><a href="https://2flow.ie">2flow.ie</a></p>
  </div>
</body>
</html>
